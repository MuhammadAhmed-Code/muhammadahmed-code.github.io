<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Awesome UI</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .card {
        width: 350px;
        padding: 30px;
        border-radius: 20px;
        backdrop-filter: blur(20px);
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        color: white;
        text-align: center;
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
    }

    h1 {
        margin-bottom: 10px;
        font-size: 28px;
    }

    p {
        opacity: 0.8;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        outline: none;
        border-radius: 10px;
        background: rgba(255,255,255,0.2);
        color: white;
    }

    input::placeholder {
        color: rgba(255,255,255,0.7);
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #00f2fe;
        background: linear-gradient(to right, #00f2fe, #4facfe);
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        opacity: 0.8;
    }

    .footer {
        margin-top: 15px;
        font-size: 12px;
        opacity: 0.6;
    }
</style>
</head>

<body>

<div class="card">
    <h1>Welcome 🚀</h1>
    <p>Create something amazing</p>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <div class="footer">Made with ❤️ by You</div>
</div>

</body>
</html>
